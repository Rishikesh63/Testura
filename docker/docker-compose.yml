version: "3.9"

services:
  api:
    build: ../backend
    ports:
      - "8000:8000"
    env_file:
      - ../backend/.env
    depends_on:
      - redis
    volumes:
      - repos_data:/tmp/repos

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  frontend:
    build: ../frontend
    ports:
      - "3000:3000"
    env_file:
      - ../frontend/.env.local

volumes:
  repos_data:

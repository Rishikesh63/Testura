# fly.toml app configuration file generated for testura-backend on 2026-05-22T13:55:06+05:30
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'testura-backend'
primary_region = 'bom'

[build]
  dockerfile = 'Dockerfile'

[env]
  REPOS_BASE_PATH = '/tmp/repos'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '512mb'
  cpus = 1
  memory_mb = 512
